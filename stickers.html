<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كوكب الملصقات 🎴 Stickers Planet</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   🌸 SAFAE PLATFORM: STICKERS ZONE CORE STYLE
   ========================================================================== */
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
}

/* 🌌 تأثير الخلفية المتحركة بألوان الوردي الناعم والأزرق السماوي */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}


body {
    min-height: 100vh;
    /* دمج ألوان الباستيل الساحرة للمنصة */
    background: linear-gradient(-45deg, #fdcddd, #b7fcf9, #ffb5c9, #b0eaff);
    background-size: 400% 400%;
    animation: gradientBG 15s infinite ease-in-out;
    font-family: 'Cairo', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px 0;
    user-select: none;
    overflow-x: hidden;
}

/* ✨ تخصيص الـ Scrollbar المميز للمنصة */
body::-webkit-scrollbar,
.stickers-grid::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}

body::-webkit-scrollbar-track,
.stickers-grid::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.3);
    border-radius: 10px;
}

body::-webkit-scrollbar-thumb,
.stickers-grid::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #ff758c 0%, #00bcd4 100%);
    border-radius: 10px;
    box-shadow: 0 0 8px rgba(255, 117, 140, 0.3);
}

/* الهيدر الأنيق الناعم للمنصة */
.spbar {
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: rgb(255, 255, 255); 
    backdrop-filter: blur(10px); 
    border-bottom: 1px solid rgba(255,255,255,0.5);
    position: sticky;
    top: 0;
    z-index: 10;
}

.bk {
    background: none;
    border: none;
    font-size: 1.4rem; 
    color: #ff79b0;
    cursor: pointer;
    transition: transform 0.2s ease;
}
.bk:hover {
    transform: scale(1.15);
}

.sptit {
    font-size: 1.05rem;
    font-weight: 700; 
    color: #4a3b53;
}

/* حاوية العنوان السينمائي المتحرك */
.stk-welcome-wrapper {
    text-align: center;
    margin: 30px auto 20px;
    padding: 0 16px;
    width: 100%;
    max-width: 600px;
}

/* 🎬 العنوان السينمائي بالتدرج اللوني الوردي والسماوي المتحرك */
.stk-main-title {
    font-size: clamp(1.4rem, 4.5vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(120deg, #ff589d, #4bdeff, #ffa4ca);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientMove 4s linear infinite;
    margin-bottom: 8px;
}

.stk-sub-text {
    font-size: 0.88rem;
    color: #8e7f96;
    font-weight: 600;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* شبكة الملصقات الاحترافية الاستجابة */
.stkgrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 800px;
    padding: 0 20px;
}

/* كروت الملصقات الناعمة والبسيطة */
.stkc {
    background: rgba(255, 255, 255, 0.75);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    padding: 20px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    box-shadow: 0 8px 20px rgba(156, 39, 176, 0.02);
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.stkc:hover {
    transform: translateY(-6px) scale(1.02);
    background: #ffffff;
    box-shadow: 0 12px 25px rgba(255, 121, 176, 0.1) !important;
}

.stke {
    font-size: 3.4rem;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.06));
    transition: transform 0.3s ease;
}
.stkc:hover .stke {
    transform: scale(1.15) rotate(4deg);
}

.stkn {
    font-size: 0.88rem;
    font-weight: 700;
    color: #4a3b53;
}

/* 📥 زر وعارض تحميل التعبئة المطور للمنصة */
.dl-wrapper {
    position: relative;
    width: 100%;
    max-width: 125px;
    height: 34px;
    border-radius: 50px;
    overflow: hidden;
    background: linear-gradient(135deg, #ff79b0, #9c27b0);
    box-shadow: 0 4px 12px rgba(255, 121, 176, 0.15);
    cursor: pointer;
    transition: all 0.3s ease;
}

.dl-wrapper:hover {
    box-shadow: 0 6px 18px rgba(0, 210, 255, 0.25);
    transform: scale(1.03);
}

/* بار التعبئة المتدرج المخفي داخلياً */
.dl-progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff79b0, #00d2ff);
    transition: width 0.1s linear;
    z-index: 1;
}

/* نص الزر العلوي */
.dl-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    z-index: 2;
    pointer-events: none;
    transition: all 0.3s ease;
}

/* حالة اكتمال التحميل الناجحة بنعومة */
.dl-wrapper.finished {
    background: linear-gradient(135deg, #00d2ff, #0066ff) !important;
    box-shadow: 0 4px 15px rgba(0, 210, 255, 0.35);
}

/* أنيميشن دخول الكروت بنعومة سينمائية عند فتح الصفحة */
.stkc {
    animation: fadeInScale 0.6s cubic-bezier(0.25, 1, 0.5, 1) both;
}
@keyframes fadeInScale {
    from { opacity: 0; transform: translateY(15px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>

    <div class="spbar">
        <button class="bk" onclick="if(window.parent && window.parent.goTo){window.parent.goTo('dash')}else{history.back()}">←</button>
        <div class="sptit">🎴 Stickers Planet</div>
        <div style="width:20px;"></div>
    </div>

    <div class="stk-welcome-wrapper">
         <h1 class="stk-main-title">WELCOME TO YOUR STICKERS PAGE</h1>
         <p class="stk-sub-text">نتمنا يعجبوك هاد الستيكرات ✨</p>
    </div>

    <div class="stkgrid" id="stkG"></div>

<script>
// 1. مصفوفة الستيكرز معدلة ومجهزة بأسماء ملفات الصور الخاصة بك (PNG)
const STKS = [
  {e: "safa 1.png", n: "sad girl"},
  {e: "safa 3.jpeg", n: "wow!"},
  {e: "safa 4.png", n: "Hmph"},
  {e: "safa 5.png", n: "what?"},
  {e: "safa 6.png", n: "Attractive"},
     {e: "safa 7.png", n: "so cuuute"},
      {e: "safa 8.png", n: "it's embarrassing"},
 {e: "safa 9.png", n: "shy girl"},
  {e: "safa 10.png", n: "hehe.."},
   {e: "safa 11.png", n: "damn!"},
    {e: "safa 12.png", n: "focus on me study"},
     {e: "safa 13.png", n: "Cute Smile"},
      {e: "safa 14.png", n: "what that f*ck!"},
      {e: "safa 15.png", n: "nice pat"},
{e: "safa 16.png", n: "good night!"},
{e: "safa 17.png", n: "good job!"},
{e: "safa 18.png", n: "hmmm?"},
{e: "safa 19.png", n: "that annoying!"},
{e: "safa 20.png", n: "my good girl!"},

  // يمكنك إضافة بقية أسماء صورك هنا بنفس الطريقة تماماً
];

// بناء الكروت فور تحميل الصفحة بالكامل
window.addEventListener("DOMContentLoaded", () => {
    buildStickersGrid();
});

// 2. إصلاح دالة بناء شبكة الملصقات لتظهر الصور والأزرار بشكل مثالي
function buildStickersGrid() {
    const sG = document.getElementById("stkG");
    sG.innerHTML = ''; 
    
    STKS.forEach((s, index) => {
        const d = document.createElement("div");
        d.className = "stkc";
        d.style.animationDelay = `${index * 30}ms`;
        
        // بناء الهيكل بالكامل واستدعاء متغير الحلقة الصحيح s
        d.innerHTML = `
            <div class="stke" style="width: 90px; height: 90px; display: flex; align-items: center; justify-content: center;">
                <img src="${s.e}" alt="${s.n}" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <div class="stkn">${s.n}</div>
            <div class="dl-wrapper" id="dl-wrap-${index}" onclick="dlStkInteractive('${s.e}', '${s.n}', ${index})">
                <div class="dl-progress-bar" id="bar-${index}"></div>
                <div class="dl-text" id="tx-${index}">⬇️ Download</div>
            </div>
        `;
        sG.appendChild(d);
    });
}

// 3. تعديل دالة التحميل الذكية لتقوم بتحميل ملف الصورة الفعلي (PNG) مباشرة دون رسمه على كانفاس
function dlStkInteractive(imgSrc, name, index) {
    const wrapper = document.getElementById(`dl-wrap-${index}`);
    const progressBar = document.getElementById(`bar-${index}`);
    const textLabel = document.getElementById(`tx-${index}`);
    
    if (wrapper.classList.contains('loading') || wrapper.classList.contains('finished')) return;
    
    wrapper.classList.add('loading');
    textLabel.innerHTML = `⏳ Downloading...`;
    
    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.floor(Math.random() * 15) + 8;
        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            
            progressBar.style.width = '100%';
            
            setTimeout(() => {
                // تحميل مباشر لملف الـ PNG الأصلي الخاص بك
                const a = document.createElement("a");
                a.download = name + ".png";
                a.href = imgSrc;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                wrapper.classList.remove('loading');
                wrapper.classList.add('finished');
                textLabel.innerHTML = `✅ Saved!`;
                
                const card = wrapper.parentElement;
                card.style.transform = "scale(1.06)";
                setTimeout(() => { card.style.transform = ""; }, 300);
                
                setTimeout(() => {
                    wrapper.classList.remove('finished');
                    progressBar.style.width = '0%';
                    textLabel.innerHTML = `⬇️ Download`;
                }, 2500);
                
            }, 200);
        } else {
            progressBar.style.width = progress + '%';
        }
    }, 40);
}
</script>
</body>
</html>
