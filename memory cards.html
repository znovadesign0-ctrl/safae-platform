<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الذاكرة 🃏</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

/* 🌸 هويات ألوان المنصة: تدرج ناعم وانسيابي بين الوردي والأزرق السماوي الباهت */
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #fff5f8 0%, #eef7ff 50%, #fff0f5 100%);
  font-family: 'Cairo', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; padding: 24px 16px 40px;
  user-select: none;
}

/* ✨ تعديل وتخصيص ديزاين السكرول بار ليصبح ناعماً وأنيقاً متناسقاً مع هوية المنصة */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #ff79b0, #00d2ff);
  border-radius: 10px;
}

/* Header */
.header {
  width: 100%; max-width: 600px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.logo {
  font-size: 1.6rem; font-weight: 900;
  background: linear-gradient(135deg, #ff79b0, #00d2ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}


.btn-back:hover {
  transform: translateX(4px) scale(1.05); /* حركة ناعمة باتجاه السهم لتعزيز تجربة المستخدم */
  background: #ffffff;
  color: #9c27b0;
  border-color: rgba(0, 210, 255, 0.3);
  box-shadow: 0 6px 15px rgba(255, 121, 176, 0.15);
}

/* Main Card Container */
.main-card {
  width: 100%; max-width: 600px;
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(12px);
  border-radius: 24px; padding: 20px;
  box-shadow: 0 10px 30px rgba(156, 39, 176, 0.03);
}

/* Level Selector */
.lvl-container {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.lvl-btn {
  flex: 1; padding: 8px; border-radius: 50px;
  border: 1px solid rgba(255, 121, 176, 0.15); background: white;
  font-family: 'Cairo', sans-serif; font-size: 0.8rem; font-weight: 700;
  color: #a47da1; cursor: pointer; transition: all 0.2s ease;
}
.lvl-btn.active {
  background: linear-gradient(135deg, #ff79b0, #9c27b0);
  border-color: transparent; color: white;
  box-shadow: 0 4px 12px rgba(156, 39, 176, 0.2);
}

/* Panel stats & Timer */
.stats-panel {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; font-size: 0.85rem; font-weight: 700; color: #4a3b53;
}
.stat-pill {
  background: rgba(255,255,255,0.8); padding: 4px 12px; border-radius: 50px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.01);
}
.timer-container {
  width: 100%; height: 6px; background: rgba(0,0,0,0.05);
  border-radius: 10px; overflow: hidden; margin-bottom: 20px;
}
.timer-bar {
  width: 100%; height: 100%;
  background: linear-gradient(90deg, #ff79b0, #00d2ff);
  transition: width 1s linear;
}

/* Grid Matrix */
.grid {
  display: grid; gap: 10px; margin-bottom: 12px;
  justify-content: center;
}

/* Memory Card Core Design */
.card {
  aspect-ratio: 1; perspective: 1000px; cursor: pointer;
}
.card-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.card.flipped .card-inner { transform: rotateY(180deg); }

.card-front, .card-back {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
}
.card-front {
  background: linear-gradient(135deg, #fff0f5, #e1bee7);
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow: 0 4px 10px rgba(0,0,0,0.02);
}
.card-front::after {
  content: '✨'; font-size: 1.4rem; opacity: 0.6;
}
.card-back {
  background: white; border: 2px solid #e1bee7;
  transform: rotateY(180deg); font-size: clamp(1.5rem, 6vw, 2.5rem);
}
.card.matched .card-back {
  border-color: #00d2ff; background: #eef7ff;
  animation: pulseSuccess 0.4s ease;
}

@keyframes pulseSuccess {
  0% { transform: rotateY(180deg) scale(1); }
  50% { transform: rotateY(180deg) scale(1.08); }
  100% { transform: rotateY(180deg) scale(1); }
}

/* Win/Lose Overlay */
.overlay {
  display: none; position: fixed; inset:0;
  background: rgba(255, 240, 245, 0.6); backdrop-filter: blur(5px);
  align-items: center; justify-content: center; z-index: 100;
}
.overlay.show { display: flex; }
.over-card {
  background: white; border-radius: 24px; padding: 24px; text-align: center;
  box-shadow: 0 10px 30px rgba(156, 39, 176, 0.1); max-width: 300px; width: 85%;
  animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { from { transform: scale(0.8); opacity:0; } to { transform: scale(1); opacity:1; } }
.over-emoji { font-size: 3rem; margin-bottom: 8px; display:block; }
.over-title { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #ff79b0, #9c27b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
.over-sub { color: #8e7f96; font-size: 0.85rem; margin-bottom: 10px; }
.over-score { font-size: 1.1rem; font-weight: 900; color: #00d2ff; margin-bottom: 18px; }
.btn-restart {
  padding: 8px 24px; background: linear-gradient(135deg, #ff79b0, #9c27b0);
  border: none; border-radius: 50px; color: white; font-family: 'Cairo', sans-serif;
  font-size: 0.85rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 121, 176, 0.2);
}
</style>
</head>
<body>


<div class="main-card">
  <div class="lvl-container">
    <button class="lvl-btn active" onclick="changeLevel('easy', this)">🟢 سهل</button>
    <button class="lvl-btn" onclick="changeLevel('medium', this)">🟡 متوسط</button>
    <button class="lvl-btn" onclick="changeLevel('hard', this)">🔴 صعب</button>
  </div>

  <div class="stats-panel">
    <div class="stat-pill">المحاولات: <span id="moves">0</span></div>
    <div class="stat-pill">الأزواج: <span id="pairs">0/0</span></div>
    <div class="stat-pill">الوقت: <span id="timerVal">0</span>ث</div>
  </div>

  <div class="timer-container">
    <div class="timer-bar" id="timerBar"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="winOverlay">
  <div class="over-card">
    <span class="over-emoji" id="winEmoji">🎉</span>
    <div class="over-title" id="winTitle">ممتازة!</div>
    <div class="over-sub" id="winSub">0 محاولة · 0 ثانية</div>
    <div class="over-score" id="winScore">النقاط: 0</div>
    <button class="btn-restart" onclick="initGame()">🔄 العب مجدداً</button>
  </div>
</div>

<script>
const EMOJIS = ['🌸','🦋','🌈','🎀','⭐','🌙','🌻','🍦','🎈','🦄','🍭','🎨','🧸','🐱','🍓','🍩'];
const LEVELS = {
  easy: { rows: 3, cols: 4, pairs: 6, time: 45 },
  medium: { rows: 4, cols: 4, pairs: 8, time: 60 },
  hard: { rows: 4, cols: 6, pairs: 12, time: 90 }
};

let state = {
  level: 'easy',
  cards: [],
  selected: [],
  moves: 0,
  matched: 0,
  timeLeft: 0,
  totalTime: 0,
  timerInterval: null,
  lock: false
};

function changeLevel(lvl, btn) {
  if(state.lock) return;
  document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.level = lvl;
  initGame();
}

function initGame() {
  clearInterval(state.timerInterval);
  const cfg = LEVELS[state.level];
  
  state.moves = 0;
  state.matched = 0;
  state.timeLeft = cfg.time;
  state.totalTime = cfg.time;
  state.selected = [];
  state.lock = false;
  
  document.getElementById('winOverlay').classList.remove('show');
  updateStats();
  updateTimerBar();

  // Pick emojis & Double them
  const picked = EMOJIS.slice(0, cfg.pairs);
  const items = [...picked, ...picked].sort(() => Math.random() - 0.5);

  // Setup Grid CSS Layout
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.style.gridTemplateRows = `repeat(${cfg.rows}, 1fr)`;
  grid.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
  
  // Calculate dynamic responsive size
  const maxW = Math.min(window.innerWidth - 70, 560);
  const cardSize = Math.floor((maxW - (cfg.cols - 1) * 10) / cfg.cols);
  
  state.cards = items.map((em, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.width = cardSize + 'px';
    card.style.height = cardSize + 'px';
    card.dataset.index = idx;
    card.dataset.emoji = em;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">${em}</div>
      </div>
    `;
    
    card.addEventListener('click', () => handleCardClick(card));
    grid.appendChild(card);
    return card;
  });

  startTimer();
}

function handleCardClick(card) {
  if (state.lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;

  card.classList.add('flipped');
  state.selected.push(card);

  if (state.selected.length === 2) {
    state.moves++;
    updateStats();
    checkMatch();
  }
}

function checkMatch() {
  state.lock = true;
  const [c1, c2] = state.selected;

  if (c1.dataset.emoji === c2.dataset.emoji) {
    c1.classList.add('matched');
    c2.classList.add('matched');
    state.matched++;
    updateStats();
    state.selected = [];
    state.lock = false;

    if (state.matched === LEVELS[state.level].pairs) {
      clearInterval(state.timerInterval);
      setTimeout(showWin, 500);
    }
  } else {
    setTimeout(() => {
      c1.classList.remove('flipped');
      c2.classList.remove('flipped');
      state.selected = [];
      state.lock = false;
    }, 800);
  }
}

function startTimer() {
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerBar();

    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      state.lock = true;
      showLose();
    }
  }, 1000);
}

function updateTimerBar() {
  const pct = (state.timeLeft / state.totalTime) * 100;
  document.getElementById('timerBar').style.width = pct + '%';
  document.getElementById('timerVal').textContent = state.timeLeft;
}

function updateStats() {
  document.getElementById('moves').textContent = state.moves;
  document.getElementById('pairs').textContent = state.matched + '/' + LEVELS[state.level].pairs;
}

function showWin() {
  const timeUsed = state.totalTime - state.timeLeft;
  const score = Math.max(0, 1000 - state.moves * 10 - timeUsed * 3);
  const rank = score >= 900 ? '🌟 أسطورية!' : score >= 700 ? '✨ ممتازة!' : score >= 500 ? '👏 جيدة جداً!' : '💪 حاولي أكثر!';

  document.getElementById('winEmoji').textContent = score >= 700 ? '🎉' : '⭐';
  document.getElementById('winTitle').textContent = rank;
  document.getElementById('winSub').textContent = `${state.moves} محاولة · ${timeUsed} ثانية`;
  document.getElementById('winScore').textContent = `النقاط: ${score}`;
  document.getElementById('winOverlay').classList.add('show');
}

function showLose() {
  document.getElementById('winEmoji').textContent = '⏰';
  document.getElementById('winTitle').textContent = 'انتهى الوقت!';
  document.getElementById('winSub').textContent = `وجدتِ ${state.matched} أزواج من أصل ${LEVELS[state.level].pairs}`;
  document.getElementById('winScore').textContent = `حظاً أوفر المرة القادمة ✨`;
  document.getElementById('winOverlay').classList.add('show');
}

window.addEventListener('resize', () => {
  const cfg = LEVELS[state.level];
  const maxW = Math.min(window.innerWidth - 70, 560);
  const cardSize = Math.floor((maxW - (cfg.cols - 1) * 10) / cfg.cols);
  if (state.cards) {
    state.cards.forEach(card => {
      card.style.width = cardSize + 'px';
      card.style.height = cardSize + 'px';
    });
  }
});

window.addEventListener('DOMContentLoaded', initGame);
</script>
</body>
</html>
